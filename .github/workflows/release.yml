name: Release

on:
  workflow_dispatch:
    inputs:
      description:
        description: Release description
        required: true
        type: string

jobs:
  get-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - id: version
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*= *"\(.*\)"/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  build:
    needs: get-version
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            asset: voice-training-tool-linux-x86_64
          - os: macos-latest
            asset: voice-training-tool-macos-aarch64.zip
          - os: macos-15-intel
            asset: voice-training-tool-macos-x86_64.zip
          - os: windows-latest
            asset: voice-training-tool-windows-x86_64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            pkg-config \
            libxcb1-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev \
            librsvg2-bin

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: brew install librsvg

      - name: Build
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./bundle.sh

      - name: Stage artifact
        shell: bash
        run: |
          mkdir dist
          if [ "${{ runner.os }}" = "macOS" ]; then
            cd build && zip -r "../dist/${{ matrix.asset }}" "Voice Training Tool.app"
          elif [ "${{ runner.os }}" = "Windows" ]; then
            cp build/voice_training_tool.exe dist/${{ matrix.asset }}
          else
            cp build/voice_training_tool dist/${{ matrix.asset }}
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist/${{ matrix.asset }}

  release:
    needs: [get-version, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          printf '%s' "${{ inputs.description }}" > release_notes.txt
          gh release create "v${{ needs.get-version.outputs.version }}" \
            --title "Voice Training Tool v${{ needs.get-version.outputs.version }}" \
            --notes-file release_notes.txt \
            artifacts/*
