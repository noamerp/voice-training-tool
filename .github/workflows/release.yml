name: Release

on:
  workflow_dispatch:
    inputs:
      description:
        description: Release description
        required: true
        type: string

jobs:
  get-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - id: version
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*= *"\(.*\)"/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

  build:
    needs: get-version
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: voice-training-tool-linux-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            asset: voice-training-tool-macos-aarch64
          - os: macos-13
            target: x86_64-apple-darwin
            asset: voice-training-tool-macos-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset: voice-training-tool-windows-x86_64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            pkg-config \
            libxcb1-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Stage artifact
        shell: bash
        run: |
          mkdir dist
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp target/${{ matrix.target }}/release/voice_training_tool.exe dist/${{ matrix.asset }}
          else
            cp target/${{ matrix.target }}/release/voice_training_tool dist/${{ matrix.asset }}
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist/${{ matrix.asset }}

  release:
    needs: [get-version, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          printf '%s' "${{ inputs.description }}" > release_notes.txt
          gh release create "v${{ needs.get-version.outputs.version }}" \
            --title "v${{ needs.get-version.outputs.version }}" \
            --notes-file release_notes.txt \
            artifacts/*
